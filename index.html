<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Suki 💞</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; }
        #pantalla-bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .pin-caja { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; border: 1px solid #d4af37; text-align: center; }
        .pin-input { font-size: 2rem; padding: 10px; width: 150px; text-align: center; letter-spacing: 10px; background: #1a1a1a; color: #d4af37; border: 2px solid #333; outline: none; border-radius: 10px; }
        #contenido-app { display: none; opacity: 0; flex-direction: column; align-items: center; padding: 40px 20px; transition: 1s; }
        .contenedor { text-align: center; padding: 25px; border-radius: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 25px; width: 100%; max-width: 500px; }
        h1 { color: #d4af37; margin-bottom: 10px; }
        .contador { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 30px; }
        .caja { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #d4af37; }
        progress { width: 100%; height: 12px; border-radius: 10px; }
        button { background: #d4af37; color: #121212; padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        .btn-secundario { background: rgba(255,255,255,0.1); color: white; border: 1px solid #d4af37; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .foto-container { position: relative; height: 200px; border-radius: 10px; overflow: hidden; }
        .foto-item { width: 100%; height: 100%; object-fit: cover; }
        .btn-borrar { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div class="pin-caja">
            <h1>🔒</h1>
            <p>Introduce nuestro código</p>
            <input type="password" id="input-pin" class="pin-input" maxlength="4">
        </div>
    </div>

    <div id="contenido-app">
        <div class="contenedor">
            <h1>Hola Suki 💞</h1>
            <div id="reloj" class="contador">Cargando...</div>
            <h3 id="mostrar-estado">Cargando estado...</h3>
            <input type="text" id="input-estado" placeholder="¿Cómo estás?" style="padding:8px; border-radius:5px; border:none; width:70%;">
            <button onclick="actualizarEstado()">Actualizar</button>
        </div>

        <div class="dashboard">
            <div class="caja">
                <div id="cara-mascota" style="font-size: 3rem;">🐶</div>
                <p id="info-mascota">Estado estable</p>
                <progress id="barra-hambre" value="0" max="100"></progress>
                <progress id="barra-felicidad" value="0" max="100" style="margin-top:10px;"></progress>
                <div style="margin-top:10px;">
                    <button class="btn-secundario" onclick="cuidar('alimentar')">🍖</button>
                    <button class="btn-secundario" onclick="cuidar('jugar')">🎾</button>
                </div>
            </div>
            <div class="caja">
                <h3>Toques de amor</h3>
                <button id="btn-corazon" onclick="teExtrano()" style="font-size:2.5rem; background:none;">❤️</button>
                <h2 id="count-extrano">0</h2>
            </div>
        </div>

        <div class="contenedor">
            <h3>Nuestros Momentos</h3>
            <div class="galeria" id="galeria"></div>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <input type="file" id="archivo-foto" accept="image/*">
            <input type="text" id="desc-foto" placeholder="¿Qué pasó aquí?">
            <button id="btn-subir" onclick="subirFoto()">Subir Recuerdo</button>
        </div>
    </div>

    <script>
        const PIN_CORRECTO = "0407";
        const API_URL = "https://servidor-aniversario-suki.onrender.com";

        document.getElementById('input-pin').addEventListener('input', function() {
            if (this.value === PIN_CORRECTO) {
                document.getElementById('pantalla-bloqueo').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('pantalla-bloqueo').style.display = 'none';
                    document.getElementById('contenido-app').style.display = 'flex';
                    setTimeout(() => document.getElementById('contenido-app').style.opacity = '1', 50);
                    cargarTodo();
                }, 800);
            }
        });

        const fechaInicio = new Date('2025-07-04T00:00:00');
        setInterval(() => {
            const dif = new Date() - fechaInicio;
            document.getElementById('reloj').innerText = `${Math.floor(dif/86400000)} días : ${Math.floor((dif/3600000)%24)}h : ${Math.floor((dif/60000)%60)}m`;
        }, 1000);

        async function cargarTodo() {
            const res = await fetch(`${API_URL}/data_inicial`);
            const data = await res.json();
            document.getElementById('mostrar-estado').innerText = data.estado.emocion;
            document.getElementById('count-extrano').innerText = data.estado.te_extrano;
            document.getElementById('barra-hambre').value = data.estado.pet.hambre;
            document.getElementById('barra-felicidad').value = data.estado.pet.felicidad;
            
            const contenedor = document.getElementById('galeria');
            contenedor.innerHTML = '';
            data.fotos.forEach(f => {
                contenedor.innerHTML += `<div class="foto-container"><img src="${f.url}" class="foto-item"><button class="btn-borrar" onclick="borrarFoto(${f.id})">×</button></div>`;
            });
        }

        async function teExtrano() {
            const txt = document.getElementById('count-extrano');
            txt.innerText = parseInt(txt.innerText) + 1;
            await fetch(`${API_URL}/te-extrano`, { method: 'POST' });
        }

        async function cuidar(accion) {
            const form = new FormData(); form.append("accion", accion);
            const res = await fetch(`${API_URL}/cuidar-mascota`, { method: 'POST', body: form });
            const data = await res.json();
            document.getElementById('barra-hambre').value = data.hambre;
            document.getElementById('barra-felicidad').value = data.felicidad;
        }

        async function subirFoto() {
            const btn = document.getElementById('btn-subir');
            btn.innerText = "..."; btn.disabled = true;
            const form = new FormData();
            form.append("archivo", document.getElementById('archivo-foto').files[0]);
            form.append("descripcion", document.getElementById('desc-foto').value);
            await fetch(`${API_URL}/subir-foto`, { method: 'POST', body: form });
            btn.innerText = "Subir Recuerdo"; btn.disabled = false;
            cargarTodo();
        }

        async function borrarFoto(id) {
            if(confirm("¿Borrar?")) {
                await fetch(`${API_URL}/borrar-foto/${id}`, { method: 'DELETE' });
                cargarTodo();
            }
        }

        async function actualizarEstado() {
            const val = document.getElementById('input-estado').value;
            const form = new FormData(); form.append("nueva_emocion", val);
            await fetch(`${API_URL}/actualizar-estado`, { method: 'POST', body: form });
            document.getElementById('mostrar-estado').innerText = val;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Espacio 💞</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Pantalla de Bloqueo */
        #pantalla-bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .pin-caja { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; border: 1px solid #d4af37; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        .pin-input { font-size: 2rem; padding: 10px; width: 150px; text-align: center; letter-spacing: 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: #d4af37; margin-top: 20px; outline: none; }
        
        /* Estilos Generales */
        #contenido-app { display: none; opacity: 0; flex-direction: column; align-items: center; padding: 50px 20px; transition: 1s; }
        .contenedor { text-align: center; padding: 30px; border-radius: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 30px; width: 90%; max-width: 600px; }
        h1, h2, h3 { color: #d4af37; }
        .contador { font-size: 1.5rem; font-weight: bold; color: #e0e0e0; margin-bottom: 10px; }
        
        /* Botones e Inputs */
        input[type="text"], input[type="file"] { padding: 12px; border-radius: 5px; border: none; background: #333; color: white; width: 80%; margin-bottom: 15px; }
        button { background-color: #d4af37; color: #121212; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { transform: scale(1.05); background-color: #f0c842; }
        
        /* Botones de Emociones */
        .contenedor-emociones { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        .btn-rapido { background: rgba(255,255,255,0.08); color: white; border: 1px solid #d4af37; border-radius: 20px; padding: 8px 15px; font-size: 0.9rem; }
        .btn-rapido:hover { background: rgba(212,175,55,0.2); }
        
        /* Dashboards */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 800px; margin-bottom: 30px; }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .caja-dash { background: rgba(255, 255, 255, 0.05); border: 1px solid #d4af37; border-radius: 15px; padding: 25px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        progress { width: 100%; height: 18px; border-radius: 10px; margin-bottom: 15px; }
        progress::-webkit-progress-bar { background-color: #333; border-radius: 10px; }
        progress::-webkit-progress-value { background-color: #d4af37; border-radius: 10px; transition: width 0.5s ease; }
        
        /* Animación de la Mascota */
        .mascota-fondo {
            background: radial-gradient(circle, rgba(212,175,55,0.25) 0%, rgba(0,0,0,0) 70%);
            width: 140px; height: 140px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; margin: 10px auto 20px auto;
            animation: respirar 3s infinite ease-in-out;
        }
        .cara-mascota { font-size: 4.5rem; transition: transform 0.3s; cursor: pointer; }
        .cara-mascota:hover { transform: scale(1.1) rotate(5deg); }
        @keyframes respirar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Galería */
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; }
        .foto-container { position: relative; height: 300px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .foto-item { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .foto-item:hover { transform: scale(1.05); }
        .btn-borrar { position: absolute; top: 10px; right: 10px; background: rgba(255, 76, 76, 0.9); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 1.2rem; cursor: pointer; display: none; }
        .foto-container:hover .btn-borrar { display: block; }
        
        .carta-bloqueada { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 10px; padding: 30px; margin-top: 20px; width: 90%; max-width: 600px; text-align: center; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <div class="pin-caja">
            <h1 style="font-size: 4rem; margin:0;">🔒</h1>
            <h2 style="margin-top: 10px;">Código de Acceso</h2>
            <input type="password" id="input-pin" class="pin-input" maxlength="4" placeholder="••••">
        </div>
    </div>

    <div id="contenido-app">
        
        <div class="contenedor">
            <h1 style="font-size: 2.8rem; margin-top:0;">Para Suki 💞</h1>
            <div class="contador" id="reloj">Calculando...</div>
            <h3 id="mostrar-estado" style="color: #fff; margin: 20px 0;">Despertando servidor...</h3>
            
            <div>
                <input type="text" id="input-estado" placeholder="Escribe un mensaje personalizado..." style="padding:10px; width:60%;">
                <button onclick="actualizarEstado()">Actualizar</button>
            </div>
            
            <div class="contenedor-emociones">
                <button class="btn-rapido" onclick="enviarEstadoRapido('Feliz de estar juntos 😊')">😊 Feliz</button>
                <button class="btn-rapido" onclick="enviarEstadoRapido('Te extraño mucho ❤️')">❤️ Te extraño</button>
                <button class="btn-rapido" onclick="enviarEstadoRapido('¡Con mucha hambre! 🍕')">🍕 Hambre</button>
                <button class="btn-rapido" onclick="enviarEstadoRapido('Un poco triste 🥺')">🥺 Triste</button>
                <button class="btn-rapido" onclick="enviarEstadoRapido('Ocupado trabajando 💻')">💻 Ocupado</button>
                <button class="btn-rapido" onclick="enviarEstadoRapido('¡Con mucho sueño! 💤')">💤 Sueño</button>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="caja-dash">
                <h2 style="margin-top:0;">Nuestra Mascota</h2>
                <div class="mascota-fondo">
                    <div id="cara-mascota" class="cara-mascota" onclick="cuidar('jugar')">🐶</div>
                </div>
                
                <div style="width: 90%; text-align: left;">
                    <p style="margin: 5px 0; font-size: 0.9rem; color: #aaa;">Nivel de Hambre</p>
                    <progress id="barra-hambre" value="0" max="100"></progress>
                    
                    <p style="margin: 5px 0; font-size: 0.9rem; color: #aaa;">Nivel de Felicidad</p>
                    <progress id="barra-felicidad" value="0" max="100"></progress>
                </div>

                <div style="margin-top: 10px;">
                    <button onclick="cuidar('alimentar')">🍖 Dar de Comer</button>
                    <button onclick="cuidar('jugar')">🎾 Jugar un Rato</button>
                </div>
            </div>

            <div class="caja-dash">
                <h2 style="margin-top:0;">Pensando en Ti</h2>
                <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <button id="btn-corazon" style="font-size:5rem; background:none; border:none; padding:0; transition: transform 0.2s;" onclick="teExtrano()">❤️</button>
                    <h1 id="count-extrano" style="font-size: 4rem; margin: 15px 0; color: #fff;">0</h1>
                </div>
            </div>
        </div>

        <h2>Nuestros Recuerdos</h2>
        <div class="galeria" id="galeria"></div>

        <div class="contenedor" style="margin-top:40px;">
            <h3>Subir Nuevo Recuerdo</h3>
            <input type="file" id="archivo-foto" accept="image/*">
            <input type="text" id="desc-foto" placeholder="Escribe algo sobre este momento...">
            <button id="btn-subir" onclick="subirFoto()">Guardar Momento</button>
        </div>

        <div class="carta-bloqueada">
            <div style="font-size: 2.5rem;">🔒</div>
            <h3>Cápsula del Tiempo</h3>
            <p>Se abrirá automáticamente el 4 de Julio de 2026</p>
        </div>
    </div>

    <script>
        const API_URL = "https://servidor-aniversario-suki.onrender.com";
        const PIN_CORRECTO = "0407";

        document.getElementById('input-pin').addEventListener('input', function() {
            if (this.value === PIN_CORRECTO) {
                document.getElementById('pantalla-bloqueo').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('pantalla-bloqueo').style.display = 'none';
                    document.getElementById('contenido-app').style.display = 'flex';
                    setTimeout(() => document.getElementById('contenido-app').style.opacity = '1', 50);
                    cargarDatos();
                }, 800);
            }
        });

        const inicio = new Date('2025-07-04T00:00:00');
        setInterval(() => {
            const dif = new Date() - inicio;
            document.getElementById('reloj').innerHTML = 
                `${Math.floor(dif/86400000)} Días : ${Math.floor((dif/3600000)%24)} Hrs : ${Math.floor((dif/60000)%60)} Min : ${Math.floor((dif/1000)%60)} Seg`;
        }, 1000);

        function procesarCaraMascota(hambre, felicidad) {
            let cara = "🐶"; 
            if (hambre > 80) cara = "🥺"; // Muy hambriento
            else if (felicidad < 30) cara = "😿"; // Triste/Falta de atención
            else if (felicidad > 80 && hambre < 40) cara = "🥰"; // Muy feliz
            document.getElementById('cara-mascota').innerText = cara;
            document.getElementById('barra-hambre').style.accentColor = hambre > 70 ? "#ff4c4c" : "#d4af37";
        }

        async function cargarDatos() {
            try {
                const res = await fetch(`${API_URL}/data_inicial`);
                const data = await res.json();
                document.getElementById('mostrar-estado').innerText = data.estado.emocion;
                document.getElementById('count-extrano').innerText = data.estado.te_extrano;
                
                const hambre = data.estado.pet.hambre;
                const felicidad = data.estado.pet.felicidad;
                document.getElementById('barra-hambre').value = hambre;
                document.getElementById('barra-felicidad').value = felicidad;
                procesarCaraMascota(hambre, felicidad);
                
                const gal = document.getElementById('galeria');
                gal.innerHTML = '';
                data.fotos.forEach(f => {
                    gal.innerHTML += `<div class="foto-container"><img src="${f.url}" class="foto-item"><button class="btn-borrar" onclick="borrarFoto(${f.id})">❌</button></div>`;
                });
            } catch (e) { document.getElementById('mostrar-estado').innerText = "Hubo un error al conectar con el servidor."; }
        }

        async function teExtrano() {
            const btn = document.getElementById('btn-corazon');
            btn.style.transform = "scale(1.4)";
            setTimeout(() => btn.style.transform = "scale(1)", 200);
            
            const txt = document.getElementById('count-extrano');
            txt.innerText = parseInt(txt.innerText) + 1;
            await fetch(`${API_URL}/te-extrano`, { method: 'POST' });
        }

        async function cuidar(accion) {
            const form = new FormData(); form.append("accion", accion);
            const res = await fetch(`${API_URL}/cuidar-mascota`, { method: 'POST', body: form });
            const data = await res.json();
            document.getElementById('barra-hambre').value = data.hambre;
            document.getElementById('barra-felicidad').value = data.felicidad;
            procesarCaraMascota(data.hambre, data.felicidad);
        }

        async function subirFoto() {
            const btn = document.getElementById('btn-subir');
            const archivo = document.getElementById('archivo-foto').files[0];
            if(!archivo) { alert("¡Elige una foto primero!"); return; }
            
            btn.innerText = "Subiendo..."; btn.disabled = true;
            const form = new FormData();
            form.append("archivo", archivo);
            form.append("descripcion", document.getElementById('desc-foto').value || "Lindo recuerdo");
            
            await fetch(`${API_URL}/subir-foto`, { method: 'POST', body: form });
            
            document.getElementById('archivo-foto').value = "";
            document.getElementById('desc-foto').value = "";
            btn.innerText = "Guardar Momento"; btn.disabled = false;
            cargarDatos();
        }

        async function borrarFoto(id) {
            if(confirm("¿Seguro que quieres borrar este recuerdo?")) {
                await fetch(`${API_URL}/borrar-foto/${id}`, { method: 'DELETE' });
                cargarDatos();
            }
        }

        async function actualizarEstado() {
            const val = document.getElementById('input-estado').value;
            if(!val) return;
            enviarEstadoRapido(val);
            document.getElementById('input-estado').value = '';
        }

        async function enviarEstadoRapido(txt) {
            document.getElementById('mostrar-estado').innerText = txt;
            const form = new FormData(); form.append("nueva_emocion", txt);
            await fetch(`${API_URL}/actualizar-estado`, { method: 'POST', body: form });
        }
    </script>
</body>
</html>
